<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Formas de Pagamento | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #fff;
        }

        .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        .card {
            background: #0f0f12;
            border: 1px solid #1a1a1a;
        }
    </style>
</head>

<body class="p-8">
    <div class="max-w-4xl mx-auto space-y-8">
        <header class="flex justify-between items-center">
            <h1 class="text-3xl font-outfit font-black">Formas de <span class="text-red-500">Pagamento</span></h1>
            <a href="index.html" class="text-zinc-500 hover:text-white text-sm">← Voltar</a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- PIX -->
            <div class="card p-8 rounded-3xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-100 transition-opacity">
                    <svg class="w-12 h-12 text-emerald-500" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2L4.5 9.5 12 17l7.5-7.5L12 2zm0 2.83l4.67 4.67L12 14.17 7.33 9.5 12 4.83zM12 19.5l-2.5-2.5H4.5L12 24.5l7.5-7.5h-5l-2.5 2.5z" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold mb-4">PIX</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest pl-2">Chave
                            PIX</label>
                        <input id="pix_key" value="51997222728"
                            class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2 mt-1 text-sm outline-none focus:border-red-500">
                    </div>
                    <button
                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold text-xs">ATUALIZAR
                        CHAVE</button>
                </div>
            </div>

            <!-- Cartão -->
            <div class="card p-8 rounded-3xl relative overflow-hidden group">
                <div
                    class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-100 transition-opacity text-blue-500">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold mb-4">Cartão (Link)</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest pl-2">Link de
                            Pagamento</label>
                        <input id="card_link" placeholder="https://pagamento.com/..."
                            class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2 mt-1 text-sm outline-none focus:border-red-500">
                    </div>
                    <button
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold text-xs">ATUALIZAR
                        LINK</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
