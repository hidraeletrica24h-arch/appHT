<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gestão de Clientes | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #fff;
        }

        .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        .card {
            background: #0f0f12;
            border: 1px solid #1a1a1a;
        }
    </style>
</head>

<body class="p-8">
    <div class="max-w-6xl mx-auto space-y-8">
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-outfit font-black">Área de <span class="text-red-500">Clientes</span></h1>
                <p class="text-zinc-500">Gerenciamento completo de acessos e bancos de dados.</p>
            </div>
            <a href="../admin/index.html" class="text-zinc-500 hover:text-white text-sm">← Painel Principal</a>
        </header>

        <div class="flex gap-4 mb-6">
            <input type="text" placeholder="Buscar por nome ou usuário..."
                class="flex-1 bg-zinc-900 border border-zinc-800 rounded-2xl px-6 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-red-600/30">
            <button
                class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-2xl font-black text-sm transition-all">+
                Novo</button>
        </div>

        <div class="card rounded-3xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-zinc-950/50 border-b border-zinc-800">
                    <tr class="text-[10px] text-zinc-500 uppercase tracking-[0.2em]">
                        <th class="px-8 py-5">Cliente / Pasta</th>
                        <th class="px-8 py-5">Criação</th>
                        <th class="px-8 py-5">Status</th>
                        <th class="px-8 py-5 text-right">Ações</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-zinc-800">
                    <tr class="hover:bg-zinc-900/50 transition-colors">
                        <td class="px-8 py-6">
                            <div class="flex items-center gap-3">
                                <div
                                    class="w-10 h-10 bg-zinc-800 rounded-xl flex items-center justify-center text-zinc-500 font-bold">
                                    JM</div>
                                <div>
                                    <p class="font-bold">João Maria</p>
                                    <p class="text-xs text-zinc-500">/joao_maria/dados.json</p>
                                </div>
                            </div>
                        </td>
                        <td class="px-8 py-6 text-sm text-zinc-400">10/03/2026</td>
                        <td class="px-8 py-6">
                            <span
                                class="px-3 py-1 bg-emerald-500/10 text-emerald-500 rounded-full text-[9px] font-black uppercase tracking-widest border border-emerald-500/20">ATIVO</span>
                        </td>
                        <td class="px-8 py-6 text-right">
                            <div class="flex justify-end gap-3">
                                <button class="p-2 text-zinc-500 hover:text-white hover:bg-zinc-800 rounded-lg"><svg
                                        class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path
                                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                    </svg></button>
                                <button class="p-2 text-zinc-500 hover:text-red-500 hover:bg-red-500/10 rounded-lg"><svg
                                        class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path
                                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
