<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HidraElétrica PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-red { box-shadow: 0 0 40px rgba(220, 38, 38, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">
    <!-- Decorações de Fundo -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-red-600/10 rounded-full blur-[120px] -z-10"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-blue-600/10 rounded-full blur-[120px] -z-10"></div>

    <div class="w-full max-w-md glass p-8 rounded-[32px] glow-red animate-in fade-in zoom-in duration-700">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-outfit font-black tracking-tighter">
                Hidra<span class="text-red-500">Elétrica</span> <span class="bg-red-600 text-[10px] px-2 py-1 rounded-md align-top ml-1">PRO</span>
            </h1>
            <p class="text-zinc-500 text-sm mt-2">Área do Cliente e Gestão de Assinaturas</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-2">Nome ou Apelido</label>
                <input type="text" id="username" required
                    class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-red-600/50 transition-all text-white placeholder-zinc-700"
                    placeholder="Seu usuário">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-2">Senha Curta</label>
                <input type="password" id="password" required
                    class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-red-600/50 transition-all text-white placeholder-zinc-700"
                    placeholder="••••">
            </div>

            <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-black text-lg transition-all transform hover:scale-[1.02] active:scale-95 shadow-xl shadow-red-900/20">
                ACESSAR PAINEL
            </button>
        </form>

        <div id="errorMsg" class="hidden mt-4 p-3 bg-red-500/10 border border-red-500/20 text-red-500 text-xs text-center rounded-xl">
            Usuário ou senha incorretos.
        </div>

        <div class="mt-8 pt-8 border-t border-zinc-800 text-center">
            <p class="text-zinc-500 text-xs">Não tem acesso ainda?</p>
            <a href="https://wa.me/5551997222728" target="_blank" class="text-red-500 font-bold text-sm hover:underline mt-1 block italic">Solicite seu acesso aqui</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`http://localhost:3001/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('gestao_token', data.token);
                    localStorage.setItem('gestao_role', data.role);
                    
                    if (data.role === 'admin') {
                        window.location.href = '../sistema/admin/index.html';
                    } else {
                        window.location.href = './dashboard_cliente.html';
                    }
                } else {
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                alert('Erro de conexão com o servidor. Certifique-se de que o backend está rodando.');
            }
        };
    </script>
</body>
</html>
